name: Publish Examples to R2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Build and Upload Example Zips to R2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Unix zip (macOS / Linux)
        run: |
          STAGING=$(mktemp -d)
          REPO_ROOT=$(pwd)

          # Copy all tracked files except Windows-only scripts
          git ls-files | grep -v '^scripts/.*\.ps1$' | while read -r file; do
            mkdir -p "${STAGING}/$(dirname "$file")"
            cp "$file" "${STAGING}/${file}"
          done

          cd "$STAGING"
          zip -r "${REPO_ROOT}/plainlang-examples-unix-${{ github.run_number }}.zip" . -x "*.DS_Store"
          echo "✓ plainlang-examples-unix-${{ github.run_number }}.zip built"

      - name: Build Windows zip
        run: |
          STAGING=$(mktemp -d)
          REPO_ROOT=$(pwd)

          # Copy all tracked files except Unix-only scripts from scripts/
          git ls-files | grep -v '^scripts/.*\.sh$' | while read -r file; do
            mkdir -p "${STAGING}/$(dirname "$file")"
            cp "$file" "${STAGING}/${file}"
          done

          # Patch config.yaml files: replace ../../scripts/run_*.sh with *.ps1
          find "$STAGING" -name "config.yaml" | while read -r cfg; do
            sed -i 's|\(../../scripts/run_[^ ]*\)\.sh|\1.ps1|g' "$cfg"
          done

          cd "$STAGING"
          zip -r "${REPO_ROOT}/plainlang-examples-windows-${{ github.run_number }}.zip" . -x "*.DS_Store"
          echo "✓ plainlang-examples-windows-${{ github.run_number }}.zip built"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp plainlang-examples-unix-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-unix-${{ github.run_number }}.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-unix-${{ github.run_number }}.zip uploaded to R2"

          aws s3 cp plainlang-examples-unix-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-unix.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-unix.zip (latest) uploaded to R2"

          aws s3 cp plainlang-examples-windows-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-windows-${{ github.run_number }}.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-windows-${{ github.run_number }}.zip uploaded to R2"

          aws s3 cp plainlang-examples-windows-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-windows.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-windows.zip (latest) uploaded to R2"
