name: Publish Examples to R2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    name: Build and Upload Example Zips to R2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Unix zip (macOS / Linux)
        run: |
          STAGING=$(mktemp -d)
          REPO_ROOT=$(pwd)

          # Copy all tracked files except Windows-only scripts
          git ls-files | grep -v '^scripts/.*\.ps1$' | while read -r file; do
            mkdir -p "${STAGING}/$(dirname "$file")"
            cp "$file" "${STAGING}/${file}"
          done

          cd "$STAGING"
          zip -r "${REPO_ROOT}/plainlang-examples-unix-${{ github.run_number }}.zip" . -x "*.DS_Store"
          echo "✓ plainlang-examples-unix-${{ github.run_number }}.zip built"

      - name: Build Windows zip
        run: |
          STAGING=$(mktemp -d)
          REPO_ROOT=$(pwd)

          # Copy all tracked files except Unix-only scripts from scripts/
          git ls-files | grep -v '^scripts/.*\.sh$' | while read -r file; do
            mkdir -p "${STAGING}/$(dirname "$file")"
            cp "$file" "${STAGING}/${file}"
          done

          # Patch config.yaml files: replace ../../scripts/run_*.sh with *.ps1
          find "$STAGING" -name "config.yaml" | while read -r cfg; do
            sed -i 's|\(../../scripts/run_[^ ]*\)\.sh|\1.ps1|g' "$cfg"
          done

          cd "$STAGING"
          zip -r "${REPO_ROOT}/plainlang-examples-windows-${{ github.run_number }}.zip" . -x "*.DS_Store"
          echo "✓ plainlang-examples-windows-${{ github.run_number }}.zip built"

      - name: Diagnose R2 credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          echo "== Secret sanity (values masked; lengths only) =="
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"
          echo "R2_ENDPOINT length: ${#R2_ENDPOINT}"
          echo "R2_BUCKET length: ${#R2_BUCKET}"
          echo "R2_ENDPOINT starts with https: $(case "$R2_ENDPOINT" in https://*) echo yes;; *) echo NO;; esac)"
          echo "R2_BUCKET has s3:// prefix (should be NO): $(case "$R2_BUCKET" in s3://*) echo YES;; *) echo no;; esac)"
          echo "R2_BUCKET has slash (should be no): $(case "$R2_BUCKET" in */*) echo YES;; *) echo no;; esac)"

          echo "== aws sts get-caller-identity (expect failure on R2; informational) =="
          aws sts get-caller-identity --endpoint-url "${R2_ENDPOINT}" || echo "(sts not supported by R2 — ignore)"

          echo "== list buckets (tests whether creds are valid S3 creds at all) =="
          aws s3 ls --endpoint-url "${R2_ENDPOINT}" || echo "FAILED: s3 ls (account level)"

          echo "== list target bucket (tests read access + bucket scope) =="
          aws s3 ls "s3://${R2_BUCKET}/" --endpoint-url "${R2_ENDPOINT}" || echo "FAILED: s3 ls on target bucket"

          echo "== head-bucket (tests bucket existence + access) =="
          aws s3api head-bucket --bucket "${R2_BUCKET}" --endpoint-url "${R2_ENDPOINT}" || echo "FAILED: head-bucket"

          echo "== test PutObject with a tiny probe object =="
          echo "probe" > /tmp/r2-probe.txt
          aws s3 cp /tmp/r2-probe.txt "s3://${R2_BUCKET}/diagnostics/r2-probe.txt" \
            --endpoint-url "${R2_ENDPOINT}" || echo "FAILED: PutObject probe"

      - name: Upload to Cloudflare R2
        if: github.event_name != 'pull_request'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp plainlang-examples-unix-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-unix-${{ github.run_number }}.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-unix-${{ github.run_number }}.zip uploaded to R2"

          aws s3 cp plainlang-examples-unix-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-unix.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-unix.zip (latest) uploaded to R2"

          aws s3 cp plainlang-examples-windows-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-windows-${{ github.run_number }}.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-windows-${{ github.run_number }}.zip uploaded to R2"

          aws s3 cp plainlang-examples-windows-${{ github.run_number }}.zip \
            s3://${R2_BUCKET}/examples/plainlang-examples-windows.zip \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/zip"
          echo "✓ plainlang-examples-windows.zip (latest) uploaded to R2"
