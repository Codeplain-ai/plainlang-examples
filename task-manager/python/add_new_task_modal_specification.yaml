    spacing: "One blank line between major sections and a single row between fields"
    border_style: "Single-line box drawing characters where supported"

  behavior_and_interactions:
    close_icon:
      function: "Closes the modal without saving"
    cancel_button:
      function: "Closes the modal without saving"
    save_button:
      function: "Validates inputs, saves task, and closes modal"
    input_fields:
      behavior: "Standard input and date picker functionality"