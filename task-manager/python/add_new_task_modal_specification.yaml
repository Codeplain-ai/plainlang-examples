        type: "Text input"
        placeholder: "Name"
        text_style: "normal"
        border: "Single-line input boundary or underline"
      description_field:
        label: "Description"
        type: "Multiline text area"
        placeholder: "This is..."
        text_style: "normal"
        border: "Single-line input boundary or underline"
      due_date_field:
        label: "Due Date"
        type: "Date input"
        default_value: "Current date"
        text_style: "normal"
        border: "Single-line input boundary or underline"

  action_buttons:
    cancel_button:
      label: "Cancel"
      style:
        text_style: "normal"
