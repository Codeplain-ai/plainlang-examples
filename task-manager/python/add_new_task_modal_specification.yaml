modal_specification:
  modal_overview:
    name: "Add New Task Modal"
    purpose: "A terminal-based user interface for adding a new task with details including name, description, and due date."

  modal_structure:
    modal_container:
      size: "Centered dialog sized to content within the terminal viewport"
      background: "Terminal default background"
      border: "Single-line terminal border"
      close_icon:
        type: "'X' icon"
        text_style: "highlighted action"
        function: "Closes the modal without saving changes"

    header_section:
      title:
        text: "Add New Task"
        text_style: "bold"
        position: "Top-centered"

    input_fields:
      task_name_field:
